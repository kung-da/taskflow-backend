services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: file:./dev.db
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: production
    volumes:
      - backend-db:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  backend-db:
